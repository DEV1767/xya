<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — AROWANA</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,800;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --sand:#F5E6C8;--sand-dk:#E8D0A0;--sand-lt:#FDF8F0;--sand-bd:#EDD9A3;
            --ocean:#0A5C8A;--ocean-dk:#084A72;--ocean-lt:#E8F4FB;--ocean-bd:#B8DDF0;
            --aqua:#00B4D8;--white:#FFFFFF;--s50:#FAFAF8;--s100:#F5F0E8;--s200:#E8E0D0;
            --s400:#A89880;--s600:#6B5B45;--s700:#4A3D2E;--s800:#2D2518;
            --amber:#F4A261;--amber-lt:#FEF3E8;--green:#2D9B6F;--green-lt:#D4F0E5;
            --red:#E63946;--red-lt:#FDE8E9;
            --nav-h:72px;--nav-top:16px;--radius:20px;--radius-sm:14px;--radius-pill:100px;
            --ease:0.22s cubic-bezier(0.4,0,0.2,1);
            --ff-display:'Fraunces',Georgia,serif;--ff-sans:'DM Sans',sans-serif;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html{scroll-behavior:smooth;}
        body{font-family:var(--ff-sans);color:var(--s800);background:var(--sand-lt);min-height:100vh;}
        a{text-decoration:none;color:inherit;}
        button{font-family:inherit;cursor:pointer;}
        h1,h2,h3,h4{font-family:var(--ff-display);font-weight:800;line-height:1.15;}
        p{font-size:1rem;line-height:1.7;color:var(--s600);}
        .container{max-width:900px;margin:0 auto;padding:0 32px;}
        .btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--ff-sans);font-size:.9rem;font-weight:600;border:none;border-radius:var(--radius-pill);cursor:pointer;transition:all var(--ease);padding:12px 26px;}
        .btn-primary{background:var(--ocean);color:#fff;box-shadow:0 4px 16px rgba(10,92,138,.25);}
        .btn-primary:hover{background:var(--ocean-dk);transform:translateY(-2px);}
        .btn-ghost{background:transparent;color:var(--ocean);border:2px solid var(--ocean-bd);}
        .btn-ghost:hover{background:var(--ocean-lt);}
        .btn-danger{background:transparent;color:var(--red);border:2px solid var(--red-lt);}
        .btn-danger:hover{background:var(--red-lt);}

        /* NAVBAR */
        .navbar-wrap{position:fixed;top:var(--nav-top);left:50%;transform:translateX(-50%);z-index:1000;width:calc(100% - 48px);max-width:1100px;}
        .navbar{background:rgba(255,255,255,.94);backdrop-filter:blur(20px);border:1.5px solid rgba(10,92,138,.10);border-radius:var(--radius-pill);box-shadow:0 8px 40px rgba(10,92,138,.13);}
        .nav-wrap{display:flex;align-items:center;justify-content:space-between;height:var(--nav-h);padding:0 28px;}
        .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
        .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--ocean),var(--aqua));border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:15px;font-family:var(--ff-display);}
        .logo-name{font-family:var(--ff-display);font-size:1.4rem;font-weight:900;background:linear-gradient(120deg,var(--ocean-dk),var(--aqua));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .nav-links{display:flex;align-items:center;gap:2px;}
        .nav-link{font-size:.87rem;font-weight:500;color:var(--s600);padding:8px 16px;border-radius:var(--radius-pill);transition:all var(--ease);border:none;background:transparent;text-decoration:none;display:inline-block;}
        .nav-link:hover,.nav-link.active{color:var(--ocean);background:var(--ocean-lt);}
        .nav-actions{display:flex;align-items:center;gap:10px;}
        .nav-profile-btn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--ocean),var(--aqua));border:none;color:white;font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;}
        .hamburger{display:none;flex-direction:column;gap:5px;background:transparent;border:none;padding:8px;}
        .hamburger span{display:block;width:22px;height:2px;background:var(--s600);border-radius:2px;}
        .overlay{position:fixed;inset:0;background:rgba(10,24,50,.4);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity var(--ease);z-index:998;}
        .overlay.open{opacity:1;pointer-events:all;}
        .drawer{position:fixed;top:0;right:0;bottom:0;width:min(300px,86vw);background:var(--white);transform:translateX(100%);transition:transform .3s;z-index:999;box-shadow:-4px 0 24px rgba(0,0,0,.1);}
        .drawer.open{transform:translateX(0);}
        .drawer-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--s100);}
        .close-drawer{background:transparent;border:none;font-size:1.8rem;color:var(--s600);cursor:pointer;}
        .drawer-links{display:flex;flex-direction:column;padding:16px;gap:4px;}
        .drawer-link{color:var(--s600);padding:14px 16px;border-radius:14px;font-weight:500;background:transparent;font-family:var(--ff-sans);font-size:1rem;text-align:left;text-decoration:none;display:block;border:none;cursor:pointer;transition:all var(--ease);}
        .drawer-link:hover{background:var(--ocean-lt);color:var(--ocean);}

        /* PAGE */
        .page-wrapper{padding-top:calc(var(--nav-top) + var(--nav-h) + 36px);padding-bottom:80px;}
        .page-header{background:linear-gradient(135deg,var(--ocean-dk),var(--ocean));border-radius:24px;padding:0;margin-bottom:32px;overflow:hidden;position:relative;}
        .page-header-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?w=900&q=60') center/cover no-repeat;opacity:.08;}
        .page-header-content{position:relative;padding:40px 44px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
        .profile-avatar{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;}
        .profile-avatar-info h1{color:white;font-size:clamp(1.5rem,3.5vw,2.2rem);}
        .profile-avatar-info p{color:rgba(255,255,255,.7);margin-top:4px;font-size:.9rem;}
        .back-btn{margin-left:auto;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);color:white;border:1.5px solid rgba(255,255,255,.3);border-radius:var(--radius-pill);padding:10px 20px;font-size:.87rem;font-weight:600;cursor:pointer;transition:all var(--ease);text-decoration:none;}
        .back-btn:hover{background:rgba(255,255,255,.25);}

        /* GRID */
        .profile-grid{display:grid;grid-template-columns:1.3fr 0.7fr;gap:20px;}
        .card{background:var(--white);border:1.5px solid var(--s100);border-radius:var(--radius);padding:28px;animation:fadeUp .4s ease-out both;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
        .card-title{font-size:1.1rem;font-family:var(--ff-sans);font-weight:700;color:var(--s800);margin-bottom:22px;padding-bottom:14px;border-bottom:2px solid var(--sand);}
        .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
        .form-group label{font-size:.77rem;font-weight:700;color:var(--s600);text-transform:uppercase;letter-spacing:.06em;}
        .form-group input,.form-group textarea,.form-group select{padding:11px 14px;border:1.5px solid var(--s200);border-radius:12px;font-size:.95rem;color:var(--s800);background:var(--s50);transition:all var(--ease);outline:none;font-family:var(--ff-sans);}
        .form-group input:focus,.form-group textarea:focus{border-color:var(--ocean);box-shadow:0 0 0 3px var(--ocean-lt);background:white;}
        .form-group input[readonly],.form-group textarea[readonly]{background:var(--s50);color:var(--s700);cursor:default;}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
        .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}

        /* STAT CARDS */
        .stat-cards{display:flex;flex-direction:column;gap:14px;}
        .stat-tile{display:flex;align-items:center;gap:14px;padding:18px;background:var(--sand-lt);border-radius:14px;border:1.5px solid var(--sand-bd);transition:all var(--ease);}
        .stat-tile:hover{background:var(--ocean-lt);border-color:var(--ocean-bd);}
        .stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;}
        .stat-icon.green{background:var(--green-lt);}
        .stat-icon.blue{background:var(--ocean-lt);}
        .stat-icon.amber{background:var(--amber-lt);}
        .stat-num{font-family:var(--ff-display);font-size:1.6rem;font-weight:800;}
        .stat-label{font-size:.8rem;color:var(--s600);}
        .logout-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--red-lt);color:var(--red);border:2px solid var(--red);border-radius:var(--radius-pill);font-weight:700;font-size:.9rem;cursor:pointer;transition:all var(--ease);margin-top:14px;}
        .logout-btn:hover{background:var(--red);color:white;}

        @media(max-width:720px){
            :root{--nav-top:10px;}
            .navbar-wrap{width:calc(100% - 24px);}
            .nav-links{display:none;}
            .hamburger{display:flex;}
            .container{padding:0 18px;}
            .page-wrapper{padding-top:calc(var(--nav-top) + var(--nav-h) + 24px);}
            .profile-grid{grid-template-columns:1fr;}
            .page-header-content{padding:28px 24px;}
            .form-row{grid-template-columns:1fr;}
        }
    </style>
</head>
<body>
    <script src="js/auth.js"></script>
    <script>if(!requireAuth()){}</script>

<!-- NAVBAR -->
<div class="navbar-wrap">
    <nav class="navbar">
        <div class="nav-wrap">
            <a href="index.html" class="logo"><div class="logo-icon">A</div><span class="logo-name">AROWANA</span></a>
            <div class="nav-links">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="index.html#browse">Browse Fish</a>
                <a class="nav-link" href="orders.html">My Orders</a>
                <a class="nav-link" href="index.html#contact">Contact</a>
            </div>
            <div class="nav-actions">
                <a href="profile.html" class="nav-profile-btn active" title="Profile" style="box-shadow:0 0 0 3px var(--ocean-bd);">👤</a>
                <button class="hamburger" onclick="toggleDrawer()"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>
</div>
<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
    <div class="drawer-header"><h3 style="font-family:var(--ff-sans)">Menu</h3><button class="close-drawer" onclick="toggleDrawer()">✕</button></div>
    <div class="drawer-links">
        <a class="drawer-link" href="index.html">Home</a>
        <a class="drawer-link" href="index.html#browse">Browse Fish</a>
        <a class="drawer-link" href="orders.html">My Orders</a>
        <a class="drawer-link" href="index.html#contact">Contact</a>
        <a class="drawer-link" href="profile.html">My Profile</a>
    </div>
</div>

<div class="page-wrapper">
    <div class="container">
        <div class="page-header">
            <div class="page-header-bg"></div>
            <div class="page-header-content">
                <div class="profile-avatar">🏢</div>
                <div class="profile-avatar-info">
                    <h1 id="headerName">Business Profile</h1>
                    <p id="headerEmail">Loading...</p>
                </div>
                <a href="index.html" class="back-btn">← Back to Home</a>
            </div>
        </div>

        <div class="profile-grid">
            <!-- Business Info -->
            <div class="card" style="animation-delay:.05s">
                <div class="card-title">🏢 Business Information</div>
                <div class="form-row">
                    <div class="form-group"><label>Business Name</label><input type="text" id="profileBusinessName" readonly></div>
                    <div class="form-group"><label>Business Type</label><input type="text" id="profileBusinessType" readonly></div>
                </div>
                <div class="form-group"><label>Contact Person</label><input type="text" id="profileContactPerson" readonly></div>
                <div class="form-row">
                    <div class="form-group"><label>Phone</label><input type="text" id="profilePhone" readonly></div>
                    <div class="form-group"><label>Email</label><input type="text" id="profileEmail" readonly></div>
                </div>
                <div class="form-group"><label>Address</label><textarea rows="3" id="profileAddress" readonly></textarea></div>
                <div class="form-group"><label>GSTIN (optional)</label><input type="text" id="profileGST" placeholder="22AAAAA0000A1Z5" readonly></div>
                <div class="btn-row">
                    <button class="btn btn-ghost" id="editBtn" onclick="toggleEdit(this)">✏️ Edit Profile</button>
                </div>
            </div>

            <!-- Stats + Logout -->
            <div style="display:flex;flex-direction:column;gap:20px;">
                <div class="card" style="animation-delay:.1s">
                    <div class="card-title">📊 Order Stats</div>
                    <div class="stat-cards">
                        <div class="stat-tile"><div class="stat-icon green">✅</div><div><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Orders</div></div></div>
                        <div class="stat-tile"><div class="stat-icon blue">⏳</div><div><div class="stat-num" id="statPending">0</div><div class="stat-label">Pending</div></div></div>
                        <div class="stat-tile"><div class="stat-icon amber">₹</div><div><div class="stat-num" id="statSpent">₹0</div><div class="stat-label">Total Spent</div></div></div>
                    </div>
                    <a href="orders.html" class="btn btn-primary" style="margin-top:16px;display:flex;justify-content:center">View All Orders →</a>
                    <button class="logout-btn" onclick="handleLogout()">🚪 Sign Out</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const BACKEND_BASE='https://techforgeinnovators.onrender.com';
const HOTEL_API_BASE=`${BACKEND_BASE}/v1/api`;
const ROUTES={profile:'/profile',orders:'/orders'};
let isEditing=false;

async function apiFetch(path,method='GET',body=null,didRetry=false){
    const options={method,credentials:'include',headers:{'Content-Type':'application/json'}};
    if(body!==null)options.body=JSON.stringify(body);
    const res=await fetch(`${HOTEL_API_BASE}${path}`,options);
    if(res.status===401&&!didRetry&&typeof refreshAccessToken==='function'){const ref=await refreshAccessToken();if(ref)return apiFetch(path,method,body,true);}
    const data=await res.json().catch(()=>({}));
    if(!res.ok){if(res.status===401){if(typeof clearTokens==='function')clearTokens();window.location.href='login.html';}throw new Error(data.message||`HTTP ${res.status}`);}
    return data;
}

function normalizeOrder(raw){
    return{
        id:raw.orderId||raw._id||raw.id||('ORD'+Date.now()),
        status:raw.status?String(raw.status).charAt(0).toUpperCase()+String(raw.status).slice(1).toLowerCase():'Pending',
        total:Number(raw.totalAmount??raw.total??0),
    };
}

document.addEventListener('DOMContentLoaded',async()=>{
    await loadProfile();
    await loadOrderStats();
});

async function loadProfile(){
    const fallName=localStorage.getItem('userName')||'Arowana User';
    const fallEmail=localStorage.getItem('userEmail')||'';
    function apply(p={}){
        const name=p.businessName||p.hotelName||p.restaurantName||p.name||fallName;
        document.getElementById('profileBusinessName').value=name;
        document.getElementById('profileBusinessType').value=p.businessType||p.type||p.role||'';
        document.getElementById('profileContactPerson').value=p.contactPerson||p.contactName||p.ownerName||p.name||fallName;
        document.getElementById('profilePhone').value=p.phone||p.mobile||p.phonenumber||'';
        document.getElementById('profileEmail').value=p.email||fallEmail;
        document.getElementById('profileAddress').value=p.address||p.location||'';
        document.getElementById('profileGST').value=p.gstin||p.gst||'';
        document.getElementById('headerName').textContent=name;
        document.getElementById('headerEmail').textContent=p.email||fallEmail;
    }
    try{const data=await apiFetch(ROUTES.profile);const p=data.data||data.profile||data;if(p&&typeof p==='object')apply(p);else apply();}
    catch(_){apply();}
}

async function loadOrderStats(){
    try{
        const data=await apiFetch(ROUTES.orders);
        const list=data.data||data.orders||data;
        const orders=Array.isArray(list)?list.map(normalizeOrder):[];
        document.getElementById('statTotal').textContent=orders.length;
        document.getElementById('statPending').textContent=orders.filter(o=>o.status==='Pending').length;
        const spent=orders.filter(o=>o.status==='Delivered').reduce((s,o)=>s+o.total,0);
        document.getElementById('statSpent').textContent='₹'+spent.toLocaleString('en-IN');
    }catch(_){}
}

const EDIT_FIELDS=['profileBusinessName','profileBusinessType','profileContactPerson','profilePhone','profileEmail','profileAddress','profileGST'];

function toggleEdit(btn){
    if(!isEditing){
        EDIT_FIELDS.forEach(id=>{const el=document.getElementById(id);if(el)el.removeAttribute('readonly');});
        btn.textContent='💾 Save Profile';isEditing=true;
    } else {
        saveProfile(btn);
    }
}

async function saveProfile(btn){
    const body={
        businessName:document.getElementById('profileBusinessName').value.trim(),
        businessType:document.getElementById('profileBusinessType').value.trim(),
        contactPerson:document.getElementById('profileContactPerson').value.trim(),
        phone:document.getElementById('profilePhone').value.trim(),
        email:document.getElementById('profileEmail').value.trim(),
        address:document.getElementById('profileAddress').value.trim(),
        gstin:document.getElementById('profileGST').value.trim()
    };
    try{
        await apiFetch(ROUTES.profile,'PUT',body);
        showToast('Profile updated ✅');
        document.getElementById('headerName').textContent=body.businessName||body.contactPerson;
        document.getElementById('headerEmail').textContent=body.email;
    }catch(err){showToast(err.message||'Could not save');}
    finally{
        EDIT_FIELDS.forEach(id=>{const el=document.getElementById(id);if(el)el.setAttribute('readonly','readonly');});
        btn.textContent='✏️ Edit Profile';isEditing=false;
    }
}

function handleLogout(){
    if(typeof clearTokens==='function')clearTokens();
    localStorage.removeItem('userName');localStorage.removeItem('userEmail');
    window.location.href='login.html';
}

function toggleDrawer(){
    const open=document.getElementById('overlay').classList.toggle('open');
    document.getElementById('drawer').classList.toggle('open');
    document.body.style.overflow=open?'hidden':'';
}

function showToast(msg){
    const n=document.createElement('div');
    n.style.cssText='position:fixed;top:100px;right:20px;background:var(--ocean);color:white;padding:12px 20px;border-radius:100px;box-shadow:0 8px 24px rgba(10,92,138,.35);z-index:10000;font-weight:600;font-size:.87rem;';
    n.textContent=msg;document.body.appendChild(n);
    setTimeout(()=>{n.style.opacity='0';n.style.transition='opacity .3s';setTimeout(()=>n.remove(),300);},3000);
}
</script>
</body>
</html>
